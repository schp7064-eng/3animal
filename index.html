const $=s=>document.querySelector(s);function save(){localStorage.setItem(key,JSON.stringify([...collected]));}function byName(n){return animals.find(a=>a.name===n)}function setImg(img,a){img.src=(a.images&&a.images[0])||placeholder;img.onerror=()=>{img.src=placeholder};img.alt=a.name+' 사진';}
function updateProgress(){ $('#progressText').textContent=`${collected.size} / ${animals.length}`; $('#progressBar').style.width=(collected.size/animals.length*100)+'%'; const unlocked=collected.size>=15; $('#commonQuizBtn').classList.toggle('hidden',!unlocked); $('#commonQuizHint').textContent=unlocked?'추가 퀴즈가 열렸어요! 동물들의 공통점과 차이점을 비교해 봐요.':`도감 ${15-collected.size}개를 더 등록하면 추가 퀴즈가 열려요.`;}
function renderGrid(){const grid=$('#grid');grid.innerHTML='';animals.forEach(a=>{const got=collected.has(a.id);const card=document.createElement('button');card.className='card text-left bg-white rounded-2xl overflow-hidden border-2 '+(got?'border-yellow-400':'border-slate-200')+' shadow-sm';card.innerHTML=`<div class='h-36 md:h-40 img-frame relative'><img class='w-full h-full object-cover' alt='${a.name} 사진'><div class='absolute top-2 right-2'>${got?"<span class='badge bg-yellow-300 text-yellow-900'>획득 </span>":"<span class='badge bg-slate-100 text-slate-700'>퀴즈 대기</span>"}</div></div><div class='p-3'><h3 class='font-black text-lg'>${a.name}</h3><p class='text-xs text-gray-500 mt-1'>클릭해서 관찰하기</p></div>`;setImg(card.querySelector('img'),a);card.onclick=()=>openAnimal(a);grid.appendChild(card);});updateProgress();}
function openAnimal(a){current=a;qi=0;$('#modal').classList.remove('hidden');$('#modal').classList.add('flex');document.body.style.overflow='hidden';$('#modalName').textContent=a.name;setImg($('#modalImg'),a);renderStudy();}
function closeModal(){$('#modal').classList.add('hidden');$('#modal').classList.remove('flex');document.body.style.overflow='auto';renderGrid();}
function renderStudy(){const got=collected.has(current.id);$('#statusBadge').textContent=got?'도감 등록 완료 ':'퀴즈 대기';$('#statusBadge').className='badge '+(got?'bg-yellow-300 text-yellow-900':'bg-emerald-500 text-white');$('#quizArea').classList.add('hidden');$('#successArea').classList.add('hidden');$('#commonQuizArea').classList.add('hidden');$('#studyArea').classList.remove('hidden');$('#studyArea').innerHTML=`<div class='grid md:grid-cols-2 gap-4'><section class='bg-blue-50 border-l-4 border-blue-400 rounded-2xl p-4'><h4 class='font-black text-blue-800 mb-2'>생김새</h4><p class='leading-relaxed'>${current.appearance}</p></section><section class='bg-green-50 border-l-4 border-green-400 rounded-2xl p-4'><h4 class='font-black text-green-800 mb-2'>사는 곳</h4><p class='leading-relaxed'>${current.habitat}</p></section><section class='bg-amber-50 border-l-4 border-amber-400 rounded-2xl p-4'><h4 class='font-black text-amber-800 mb-2'>환경에 살아가는 방법</h4><p class='leading-relaxed'>${current.adaptation}</p></section><section class='bg-purple-50 border-l-4 border-purple-400 rounded-2xl p-4'><h4 class='font-black text-purple-800 mb-2'>특징과 분류 힌트</h4><p class='leading-relaxed'>${current.hint}</p></section></div><div class='text-center pt-4'><button onclick='startQuiz()' class='bg-emerald-600 hover:bg-emerald-700 text-white px-8 py-4 rounded-2xl font-black shadow-lg'>퀴즈 풀고 이미지 획득하기</button></div>`;}
function startQuiz(){qi=0;$('#studyArea').classList.add('hidden');$('#quizArea').classList.remove('hidden');renderQuiz();}
function renderQuiz(){const q=current.quizzes[qi];$('#quizArea').innerHTML=`<p class='text-center text-sm font-black text-emerald-600'>${qi+1} / ${current.quizzes.length}</p><h3 class='text-2xl font-black text-center my-5 break-keep'>${q.q}</h3><div class='space-y-3'>${q.options.map((o,i)=>`<button class='quiz-option w-full text-left bg-white border-2 border-slate-200 hover:border-emerald-400 rounded-2xl p-4 font-bold' onclick='answer(${i}, this)'><span class='inline-flex w-8 h-8 rounded-full bg-slate-100 items-center justify-center mr-3 font-black'>${i+1}</span>${o}</button>`).join('')}</div><p id='feedback' class='text-center mt-5 h-7 font-black'></p><button onclick='renderStudy()' class='mt-3 text-sm underline text-gray-500'>설명 다시 보기</button>`;}
function answer(i,btn){const q=current.quizzes[qi];document.querySelectorAll('.quiz-option').forEach(b=>b.disabled=true);if(i===q.a){btn.classList.add('bg-emerald-100','border-emerald-500','text-emerald-800');$('#feedback').textContent='정답이에요! ⭕';$('#feedback').className='text-center mt-5 h-7 font-black text-emerald-600';setTimeout(()=>{qi++;if(qi<current.quizzes.length)renderQuiz();else success();},800);}else{btn.classList.add('bg-rose-100','border-rose-500','text-rose-700');$('#feedback').textContent='아쉬워요. 설명을 다시 살펴봐요!';$('#feedback').className='text-center mt-5 h-7 font-black text-rose-600';setTimeout(renderStudy,1200);}}
function success(){collected.add(current.id);save();$('#quizArea').classList.add('hidden');$('#successArea').classList.remove('hidden');updateProgress();}
function openCommonQuiz(){if(collected.size<15){alert('도감을 15개 이상 등록하면 열려요!');return;}commonQi=0;commonScore=0;$('#modal').classList.remove('hidden');$('#modal').classList.add('flex');document.body.style.overflow='hidden';$('#modalName').textContent='공통점·차이점 퀴즈';$('#modalImg').src="data:image/svg+xml;charset=UTF-8,"+encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' width='900' height='500'><rect width='100%' height='100%' fill='#fef3c7'/><text x='50%' y='42%' text-anchor='middle' font-size='46' font-family='sans-serif' fill='#92400e'>공통점 · 차이점 퀴즈</text><text x='50%' y='58%' text-anchor='middle' font-size='26' font-family='sans-serif' fill='#78350f'>동물들의 특징을 비교해 봐요</text></svg>`);$('#statusBadge').textContent='추가 퀴즈';$('#statusBadge').className='badge bg-amber-400 text-amber-950';$('#studyArea').classList.add('hidden');$('#quizArea').classList.add('hidden');$('#successArea').classList.add('hidden');$('#commonQuizArea').classList.remove('hidden');renderCommonQuiz();}
function renderCommonQuiz(){const q=commonQuizzes[commonQi];const cards=q.animals.map(n=>byName(n)).filter(Boolean);$('#commonQuizArea').innerHTML=`<p class='text-center text-sm font-black text-amber-600'>${commonQi+1} / ${commonQuizzes.length}</p><div class='compare-wrap'>${cards.map(a=>`<div class='compare-card'><img class='compare-img' data-animal='${a.name}' alt='${a.name} 사진'><div class='mt-2'>${a.name}</div></div>`).join('')}</div><h3 class='text-2xl font-black text-center my-5 break-keep'>${q.q}</h3><div class='space-y-3'>${q.options.map((o,i)=>`<button class='common-option w-full text-left bg-white border-2 border-slate-200 hover:border-amber-400 rounded-2xl p-4 font-bold' onclick='answerCommon(${i}, this)'><span class='inline-flex w-8 h-8 rounded-full bg-slate-100 items-center justify-center mr-3 font-black'>${i+1}</span>${o}</button>`).join('')}</div><p id='commonFeedback' class='text-center mt-5 min-h-12 font-black'></p><button onclick='closeModal()' class='mt-5 text-sm underline text-gray-500'>도감으로 돌아가기</button>`;document.querySelectorAll('.compare-img').forEach(img=>setImg(img,byName(img.dataset.animal)));}
function answerCommon(i,btn){const q=commonQuizzes[commonQi];document.querySelectorAll('.common-option').forEach(b=>b.disabled=true);if(i===q.a){commonScore++;btn.classList.add('bg-emerald-100','border-emerald-500','text-emerald-800');$('#commonFeedback').innerHTML=`정답이에요! ⭕<br><span class='text-sm text-gray-600'>${q.explain}</span>`;$('#commonFeedback').className='text-center mt-5 min-h-12 font-black text-emerald-600';}else{btn.classList.add('bg-rose-100','border-rose-500','text-rose-700');const buttons=document.querySelectorAll('.common-option');buttons[q.a].classList.add('bg-emerald-100','border-emerald-500','text-emerald-800');$('#commonFeedback').innerHTML=`아쉬워요. 정답을 확인해 봐요!<br><span class='text-sm text-gray-600'>${q.explain}</span>`;$('#commonFeedback').className='text-center mt-5 min-h-12 font-black text-rose-600';}setTimeout(()=>{commonQi++;if(commonQi<commonQuizzes.length)renderCommonQuiz();else finishCommonQuiz();},1700);}
function finishCommonQuiz(){$('#commonQuizArea').innerHTML=`<div class='text-center py-10'><div class='text-7xl mb-4'>👏</div><h3 class='text-3xl font-black text-amber-600'>비교 퀴즈 완료!</h3><p class='mt-3 text-gray-700 font-bold'>${commonQuizzes.length}문제 중 ${commonScore}문제를 맞혔어요.</p><p class='mt-2 text-gray-500'>동물의 생김새, 사는 곳, 움직이는 방법을 비교하면 공통점과 차이점을 더 잘 찾을 수 있어요.</p><button onclick='closeModal()' class='mt-6 bg-slate-900 text-white px-6 py-3 rounded-xl font-black'>도감으로 돌아가기</button></div>`;}
$('#closeBtn').onclick=closeModal;$('#backBtn').onclick=closeModal;$('#modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal();});$('#resetBtn').onclick=()=>{if(confirm('도감 등록 기록을 지울까요?')){collected.clear();save();renderGrid();}};$('#commonQuizBtn').onclick=openCommonQuiz;renderGrid();
</script></body></html>
